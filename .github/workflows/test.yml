name: Test Failure Demo

on: [push]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Install Compiler
        run: sudo apt-get update && sudo apt-get install g++

      - name: Compile Test
        run: g++ test.cpp -o test

      - name: Run Test
        run: ./test
